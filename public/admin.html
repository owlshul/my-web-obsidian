<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — My Notes</title>
  <link rel="stylesheet" href="/css/primary-web.css">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="icon" type="image/png" href="/favicon.png">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* Admin-specific overrides */
    body.theme-dark .sidebar { background: #141210; }
    body.theme-dark .editor-topbar,
    body.theme-dark .editor-toolbar { background: #1a1714; }
    body.theme-dark .editor-cm-wrap .cm-editor { background: #1e1b16; }
    body.theme-dark .editor-cm-wrap .cm-gutters { background: #181512; border-color: var(--border); }
    .main { flex-direction: row; }
    .editor-wrap { border-left: 1px solid var(--border); }
  </style>
</head>
<body class="theme-dark">

<div id="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="/" class="sidebar-logo" target="_blank">
        <div class="logo-icon"><i data-lucide="leaf"></i></div>
        <span>My Notes</span>
      </a>
      <div class="sidebar-actions">
        <button class="btn-icon" id="newFolderBtn" title="New folder"><i data-lucide="folder-plus"></i></button>
        <button class="btn-icon" id="newNoteBtn"   title="New note"><i data-lucide="file-plus"></i></button>
        <button class="btn-icon" id="toggleTheme"  title="Toggle theme"><i data-lucide="moon"></i></button>
      </div>
    </div>

    <div class="sidebar-search">
      <div style="position:relative;display:flex;align-items:center;">
        <i data-lucide="search" style="position:absolute;left:8px;width:14px;height:14px;color:var(--text-faint);"></i>
        <input type="search" id="searchInput" placeholder="Search notes…" autocomplete="off" style="padding-left:28px;width:100%;">
      </div>
    </div>

    <div class="file-tree" id="fileTree">
      <div class="tree-empty" style="padding-top:2rem">
        <div style="display:flex;justify-content:center;margin-bottom:.5rem;color:var(--text-faint)"><i data-lucide="folder-open" style="width:32px;height:32px;"></i></div>
        Loading…
      </div>
    </div>

    <div style="padding:.6rem .75rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:.5rem">
      <span style="font-size:.72rem;color:var(--text-faint)">Admin</span>
      <button class="btn btn-ghost" id="logoutBtn" style="font-size:.72rem;padding:.2rem .5rem">Logout</button>
    </div>
  </aside>

  <div class="resizer" id="leftResizer"></div>

  <!-- Editor Area -->
  <main class="main" id="editorArea">
    <!-- Welcome / no note selected -->
    <div class="content-pane" id="welcomePane">
      <div class="welcome fade-in">
        <div class="welcome-logo"><i data-lucide="edit-3"></i></div>
        <h2>Select or create a note</h2>
        <p>Use the sidebar to open a note, or click new note to create one.</p>
        <div style="display:flex;gap:.5rem;margin-top:.5rem">
          <button class="btn btn-primary" id="welcomeNewNote">New Note</button>
          <button class="btn btn-ghost"   id="welcomeNewFolder">New Folder</button>
        </div>
      </div>
    </div>

    <!-- Editor pane (hidden until note opened) -->
    <div class="editor-wrap" id="editorPane" style="display:none;flex:1;flex-direction:column;overflow:hidden">
      <div class="editor-topbar">
        <button class="btn-icon" id="sidebarToggle" title="Toggle sidebar"><i data-lucide="menu"></i></button>
        <input type="text" class="note-title-input" id="noteTitleInput" placeholder="Note title…">
        <div class="visibility-toggle private" id="visibilityToggle" title="Click to toggle visibility">
          <i data-lucide="lock" id="visIcon" style="width:14px;height:14px;"></i>
          <span id="visLabel">Private</span>
        </div>
        <span class="save-status" id="saveStatus">All saved</span>
        <button class="btn btn-primary" id="saveBtn">Save</button>
        <button class="btn-icon topbar-toggle" id="rightSidebarToggle" title="Toggle outline"><i data-lucide="panel-right"></i></button>
      </div>

      <div class="editor-toolbar" id="editorToolbar">
        <button class="toolbar-btn" data-action="bold"    title="Bold (Ctrl+B)"><i data-lucide="bold"></i></button>
        <button class="toolbar-btn" data-action="italic"  title="Italic (Ctrl+I)"><i data-lucide="italic"></i></button>
        <button class="toolbar-btn" data-action="strike"  title="Strikethrough"><i data-lucide="strikethrough"></i></button>
        <div class="sep"></div>
        <button class="toolbar-btn" data-action="h1" title="Heading 1"><i data-lucide="heading-1"></i></button>
        <button class="toolbar-btn" data-action="h2" title="Heading 2"><i data-lucide="heading-2"></i></button>
        <button class="toolbar-btn" data-action="h3" title="Heading 3"><i data-lucide="heading-3"></i></button>
        <div class="sep"></div>
        <button class="toolbar-btn" data-action="code"    title="Inline code"><i data-lucide="code"></i></button>
        <button class="toolbar-btn" data-action="codeblock" title="Code block"><i data-lucide="file-code"></i></button>
        <button class="toolbar-btn" data-action="quote"   title="Blockquote"><i data-lucide="quote"></i></button>
        <div class="sep"></div>
        <button class="toolbar-btn" data-action="ul"     title="Bullet list"><i data-lucide="list"></i></button>
        <button class="toolbar-btn" data-action="ol"     title="Numbered list"><i data-lucide="list-ordered"></i></button>
        <button class="toolbar-btn" data-action="hr"     title="Divider"><i data-lucide="minus"></i></button>
        <div class="sep"></div>
        <button class="toolbar-btn" data-action="link"   title="Link"><i data-lucide="link"></i></button>
        <button class="toolbar-btn" data-action="image"  title="Image"><i data-lucide="image"></i></button>
        <button class="toolbar-btn" data-action="callout-note"    title="Note callout"><i data-lucide="info"></i></button>
        <button class="toolbar-btn" data-action="callout-warning" title="Warning callout"><i data-lucide="alert-triangle"></i></button>
        <div class="sep"></div>
        <button class="btn btn-ghost" id="previewToggleBtn" style="font-size:.75rem; padding:.2rem .5rem; height: 26px;">
          <i data-lucide="eye" style="width:14px;height:14px;"></i> Preview
        </button>
      </div>

      <div class="editor-cm-wrap" id="editorCmWrap"></div>
      <div class="preview-wrap note-body fade-in" id="previewWrap" style="display:none; flex:1; overflow-y:auto; padding: 2rem;"></div>
    </div>
    
    <div class="resizer" id="rightResizer" style="display:none;"></div>
    <!-- Right Sidebar (Outline) -->
    <aside class="sidebar-right hidden" id="outlinePane">
      <div class="outline-title">Outline</div>
      <ul class="outline-list" id="outlineList"></ul>
    </aside>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" style="display:none">
  <div class="modal" id="modal">
    <h3 id="modalTitle">New Note</h3>
    <div id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="modalCancel">Cancel</button>
      <button class="btn btn-primary" id="modalConfirm">Create</button>
    </div>
  </div>
</div>

<!-- Context Menu -->
<div class="ctx-menu" id="ctxMenu" style="display:none"></div>

<!-- Toasts -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- Marked.js for perfect Markdown rendering in Preview -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script type="module" src="/js/admin.js"></script>
</body>
</html>
