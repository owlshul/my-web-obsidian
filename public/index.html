<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Le Notes</title>
  <meta name="description" content="Cooool..nhi?">
  <link rel="stylesheet" href="/css/primary-web.css">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="icon" type="image/png" href="/favicon.png">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="theme-light">

<div id="app">
  <!-- Reading Progress Bar -->
  <div class="reading-progress" id="readingProgress">
    <div class="reading-progress-bar" id="readingProgressBar"></div>
  </div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="/" class="sidebar-logo">
        <div class="logo-icon"><i data-lucide="leaf"></i></div>
        <span id="siteTitle">Notes</span>
      </a>
      <div class="sidebar-actions">
        <button class="btn-icon theme-toggle" id="toggleTheme" title="Toggle theme"><i data-lucide="sun"></i></button>
      </div>
    </div>

    <div class="sidebar-search">
      <div style="position:relative;display:flex;align-items:center;">
        <i data-lucide="search" style="position:absolute;left:8px;width:14px;height:14px;color:var(--text-faint);"></i>
        <input type="search" id="searchInput" placeholder="Search notes…" autocomplete="off" style="padding-left:28px;width:100%;">
        <span class="kbd-hint" id="kbdHint"><kbd>⌘K</kbd></span>
      </div>
    </div>

    <div class="file-tree" id="fileTree">
      <div class="tree-empty" style="padding-top:2rem">
        <div style="display:flex;justify-content:center;margin-bottom:.5rem;color:var(--text-faint)"><i data-lucide="sprout" style="width:32px;height:32px;"></i></div>
        Loading notes…
      </div>
    </div>

    <div style="padding:.75rem;border-top:1px solid var(--border);font-size:.72rem;color:var(--text-faint);display:flex;align-items:center;justify-content:space-between">
      <span>Public notes</span>
      <a href="/login" style="color:var(--text-faint);font-size:.7rem;display:flex;align-items:center;gap:4px;">Admin <i data-lucide="external-link" style="width:12px;height:12px;"></i></a>
    </div>
  </aside>

  <div class="resizer" id="leftResizer"></div>

  <!-- Main -->
  <main class="main" id="mainArea">
    <div class="topbar">
      <button class="btn-icon topbar-toggle" id="sidebarToggle" title="Toggle sidebar"><i data-lucide="menu"></i></button>
      <div class="breadcrumb" id="breadcrumb">
        <a href="/">Home</a>
      </div>
      <div class="topbar-right">
        <button class="btn btn-ghost" id="exportPdfBtn" style="font-size:.75rem; padding:.2rem .5rem; height: 26px; display: none;" title="Export Note as clean PDF">
          <i data-lucide="file-down" style="width:14px;height:14px;"></i> PDF
        </button>
        <div class="topbar-sep"></div>

        <!-- Desktop Tools -->
        <div class="desktop-tools">
          <button class="btn-icon" id="toggleHighlighter" title="Toggle Auto-Highlight Mode">
            <i data-lucide="highlighter"></i>
          </button>
          <button class="btn-icon" id="clearHighlightsBtn" title="Clear Highlights in this note">
            <i data-lucide="eraser"></i>
          </button>
          <div class="topbar-sep"></div>
          <div class="font-size-controls">
            <button class="font-size-btn" id="fontSizeDec" title="Decrease text size">A−</button>
            <button class="font-size-btn reset" id="fontSizeReset" title="Reset text size">A</button>
            <button class="font-size-btn" id="fontSizeInc" title="Increase text size">A+</button>
          </div>
        </div>

        <!-- Mobile Tools -->
        <button popovertarget="mobileToolsPopover" class="btn-icon mobile-only" title="Tools">
          <i data-lucide="pencil"></i>
        </button>
        <div id="mobileToolsPopover" popover="auto" class="mobile-tools-popover">
          <div class="popover-row">
            <button class="btn-icon popover-btn" id="popoverToggleHighlighter" title="Toggle Auto-Highlight">
              <i data-lucide="highlighter"></i>
              <span>Auto-Highlight</span>
            </button>
          </div>
          <div class="popover-row">
            <button class="btn-icon popover-btn" id="popoverClearHighlightsBtn" title="Clear Highlights">
              <i data-lucide="eraser"></i>
              <span>Clear Highlights</span>
            </button>
          </div>
          <div class="popover-row font-size-row">
            <button class="font-size-btn" id="popoverFontSizeDec">A−</button>
            <button class="font-size-btn reset" id="popoverFontSizeReset">A</button>
            <button class="font-size-btn" id="popoverFontSizeInc">A+</button>
          </div>
        </div>

        <div class="topbar-sep desktop-sep"></div>
        <button class="btn-icon theme-toggle" id="toggleThemeTopbar" title="Toggle theme"><i data-lucide="sun"></i></button>
        <div class="topbar-sep"></div>
        <button class="btn-icon" id="fullscreenBtn" title="Toggle fullscreen"><i data-lucide="maximize"></i></button>
        <div class="topbar-sep"></div>
        <button class="btn-icon topbar-toggle" id="rightSidebarToggle" title="Toggle outline"><i data-lucide="panel-right"></i></button>
      </div>
    </div>

    <div class="content-wrapper">
      <div class="content-pane" id="contentPane">
        <div class="welcome fade-in">
          <div class="welcome-hero">
            <div class="welcome-logo"><i data-lucide="leaf"></i></div>
            <h2>Hii!</h2>
            <p> You asked for notes, well, this is just a fancy way of sending them. Easier than dumping files on you.

cool, maybe.

ab padhl lete hain bhai.

~Anshul </p>
            <p>Select a note from the sidebar (left side wala) to start reading.</p>
          </div>
        </div>
      </div>
      <div class="resizer" id="rightResizer" style="display:none;"></div>
      <aside class="sidebar-right hidden" id="outlinePane">
        <!-- Outline View -->
        <div id="outlineView" class="sidebar-view active">
          <div class="outline-header">
            <div class="outline-title">Outline</div>
            <button class="btn-link" id="viewHighlightsBtn">Highlights</button>
          </div>
          <ul class="outline-list" id="outlineList"></ul>
        </div>
        <!-- Highlights View -->
        <div id="highlightsView" class="sidebar-view hidden">
          <div class="outline-header">
            <button class="btn-link back-btn" id="backToOutlineBtn">
              <i data-lucide="chevron-left"></i> Outline
            </button>
          </div>
          <div class="outline-title" style="margin-top: 0.5rem;">Highlights</div>
          <div id="highlightsListContainer" class="highlights-container"></div>
        </div>
      </aside>
    </div>
  </main>
</div>

<!-- Back to Top Button -->
<button class="back-to-top" id="backToTop" title="Back to top">
  <i data-lucide="chevron-up"></i>
</button>

<div class="toast-wrap" id="toastWrap"></div>

<!-- Floating Highlighter Button -->
<div id="floatingHighlighter" class="floating-highlighter hidden">
  <button id="floatingHighlightBtn" title="Highlight Selection">
    <i data-lucide="highlighter"></i>
  </button>
</div>

<!-- Marked.js for perfect Markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="/js/highlights.js"></script>
<script src="/js/visitor.js"></script>
</body>
</html>
